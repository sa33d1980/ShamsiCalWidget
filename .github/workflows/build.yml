name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" \
            -o gradlew
          chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APKs
        run: find app/build/outputs/apk/debug/ -name "*.apk" | sort

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: ShamsiCalWidget-universal
          path: app/build/outputs/apk/debug/*universal*.apk
          retention-days: 30

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: ShamsiCalWidget-arm64-v8a
          path: app/build/outputs/apk/debug/*arm64*.apk
          retention-days: 30

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: ShamsiCalWidget-armeabi-v7a
          path: app/build/outputs/apk/debug/*v7a*.apk
          retention-days: 30
